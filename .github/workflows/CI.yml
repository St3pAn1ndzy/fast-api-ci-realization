name: CI
on: push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install requierements
        run: pip install -r requirements.txt
      - name: Mypy check
        run: mypy .
      - name: Black check
        run: black --check --diff .
      - name: Isort check 
        run: isort --check-only --diff .
      - name: Flake8 check
        run: flake8 .
